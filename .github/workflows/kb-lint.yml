name: Knowledge base lint & visualize

on:
  pull_request:
    paths:
      - "memory/**"
      - ".kb/**"
      - "scripts/kb.py"
      - "scripts/visualize.py"
  push:
    branches: [main]
    paths:
      - "memory/**"
      - ".kb/**"
      - "scripts/kb.py"
      - "scripts/visualize.py"
  schedule:
    - cron: "0 6 * * 1"  # weekly, Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  lint-and-visualize:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run test suite
        run: python3 -m unittest discover tests

      - name: Schema and staleness lint
        run: python3 scripts/kb.py lint

      - name: Regenerate memory graph
        run: python3 scripts/visualize.py

      - name: Fail if generated graph is out of date
        run: |
          git diff --exit-code -- .kb/generated/graph.mmd .kb/generated/graph.md .kb/generated/index.md || \
          (echo ".kb/generated graph files are stale — run scripts/visualize.py and commit them" && exit 1)

  strict-lint:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Strict lint (staleness/unverified-age are fatal)
        run: python3 scripts/kb.py lint --strict
